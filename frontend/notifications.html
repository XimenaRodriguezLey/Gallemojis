<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notificaciones | Gallemojis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            color-scheme: light;
            --bg-primary: oklch(42.563% 0.07264 164.331);
            --accent: oklch(43.2% 0.095 166.913);
            --accent-contrast: oklch(92.637% 0.04285 117.333);
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(113,183,110,0.85), transparent 25%),
                        radial-gradient(circle at bottom left, rgba(110,208,153,0.85), transparent 25%),
                        var(--bg-primary);
        }
        .panel {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.72);
            backdrop-filter: blur(18px);
        }
        .action-button {
            background-color: var(--accent);
            color: white;
        }
        .action-button:hover {
            background-color: color-mix(in srgb, var(--accent) 75%, black 25%);
        }
        .notif-card {
            transition: all 0.2s;
        }
        .notif-card.leida {
            opacity: 0.65;
        }
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 20px;
            height: 72px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        #filtroNoLeidas.activo {
            background-color: var(--accent);
            color: white;
        }
    </style>
</head>
<body class="flex min-h-screen items-start justify-center px-4 py-8 sm:px-6 lg:px-8">
    <main class="w-full max-w-3xl space-y-6">

        <!-- Header -->
        <header class="panel rounded-3xl p-5 shadow-xl shadow-slate-900/5 flex items-center justify-between gap-4">
            <div>
                <p class="text-sm uppercase tracking-[0.3em] text-slate-500">Alertas</p>
                <h1 class="mt-2 text-3xl font-semibold tracking-tight">Notificaciones</h1>
                <div id="roleBadge" class="mt-2 inline-flex items-center rounded-full px-3 py-1 text-sm font-medium"></div>
            </div>
            <div class="flex items-center gap-3">
                <a href="home.html" class="rounded-3xl border border-slate-200 bg-white/80 p-3 shadow-sm transition hover:-translate-y-0.5" title="Inicio">🏠</a>
                <a href="calendario.html" class="rounded-3xl border border-slate-200 bg-white/80 p-3 shadow-sm transition hover:-translate-y-0.5" title="Calendario">📅</a>
                <button onclick="cerrarSesion()" class="rounded-3xl border border-slate-200 bg-white/80 p-3 shadow-sm transition hover:-translate-y-0.5 text-red-400" title="Cerrar sesión">↩</button>
            </div>
        </header>

        <!-- Filtros -->
        <section class="panel rounded-3xl p-4 shadow-xl shadow-slate-900/5">
            <div class="flex items-center justify-between gap-4">
                <div class="flex gap-2">
                    <button id="filtroTodas" onclick="filtrar(false)"
                        class="activo rounded-full px-4 py-2 text-sm font-medium transition border border-slate-200 bg-white/90 text-slate-700">
                        Todas
                    </button>
                    <button id="filtroNoLeidas" onclick="filtrar(true)"
                        class="rounded-full px-4 py-2 text-sm font-medium transition border border-slate-200 bg-white/90 text-slate-700">
                        No leídas
                    </button>
                </div>
                <button onclick="marcarTodasLeidas()"
                    class="text-sm text-slate-500 hover:text-slate-800 transition">
                    Marcar todas como leídas
                </button>
            </div>
        </section>

        <!-- Lista -->
        <section class="panel rounded-3xl p-6 shadow-xl shadow-slate-900/5">
            <div class="flex items-center justify-between gap-4 mb-5">
                <h2 class="text-xl font-semibold">Centro de mensajes</h2>
                <span id="countBadge" class="rounded-full bg-slate-100 px-3 py-1 text-sm font-medium text-slate-700">—</span>
            </div>
            <div id="listNotifs" class="space-y-3">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </section>

        <!-- Mensajes del maestro (solo para padres) -->
        <section id="secMensajes" class="hidden panel rounded-3xl p-6 shadow-xl shadow-slate-900/5">
            <p class="text-sm font-medium text-slate-500 mb-1">Comunicación</p>
            <h2 class="text-xl font-semibold mb-4">Mensajes del maestro</h2>
            <div id="listMensajes" class="space-y-3">
                <div class="skeleton"></div>
            </div>
        </section>

        <footer class="panel rounded-3xl p-6 shadow-xl shadow-slate-900/5">
            <div class="grid gap-4 sm:grid-cols-2">
                <a href="home.html" class="action-button rounded-3xl px-5 py-3 text-sm font-semibold shadow-lg text-center">← Volver al inicio</a>
                <a href="calendario.html" class="rounded-3xl border border-slate-200 bg-white/90 px-5 py-3 text-sm font-semibold text-slate-700 shadow-sm text-center transition hover:-translate-y-0.5">📅 Ver historial emocional</a>
            </div>
        </footer>
    </main>

    <script src="js/gallemojis-api.js"></script>
    <script>
        if (!api.requireAuth()) throw new Error('No auth');

        let todasNotifs = [];
        let soloNoLeidas = false;

        function fmtFecha(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' }) +
                   ' • ' + d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
        }

        function renderNotif(n) {
            const icono = n.leida ? '🔔' : '🟢';
            return `
            <article class="notif-card ${n.leida ? 'leida' : ''} rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-sm"
                     data-id="${n.id_notif}">
                <div class="flex items-start justify-between gap-4">
                    <div class="flex gap-3 items-start">
                        <span class="text-lg mt-0.5">${icono}</span>
                        <div>
                            <p class="text-sm text-slate-800 font-medium">${n.mensaje}</p>
                            ${!n.leida ? `<button onclick="marcarLeida('${n.id_notif}', this)"
                                class="mt-1 text-xs text-slate-400 hover:text-slate-700 transition">
                                Marcar como leída
                            </button>` : ''}
                        </div>
                    </div>
                    <time class="text-xs text-slate-400 shrink-0">${fmtFecha(n.fecha)}</time>
                </div>
            </article>`;
        }

        function renderizar() {
            const lista = soloNoLeidas ? todasNotifs.filter(n => !n.leida) : todasNotifs;
            const noLeidas = todasNotifs.filter(n => !n.leida).length;

            document.getElementById('countBadge').textContent =
                noLeidas > 0 ? `${noLeidas} nuevas` : 'Al día ✓';

            document.getElementById('listNotifs').innerHTML = lista.length
                ? lista.map(renderNotif).join('')
                : '<p class="text-sm text-slate-500 text-center py-6">No hay notificaciones aquí.</p>';
        }

        function filtrar(noLeidas) {
            soloNoLeidas = noLeidas;
            document.getElementById('filtroTodas').classList.toggle('activo', !noLeidas);
            document.getElementById('filtroNoLeidas').classList.toggle('activo', noLeidas);
            renderizar();
        }

        async function marcarLeida(id, btn) {
            try {
                await api.marcarNotificacionLeida(id);
                const notif = todasNotifs.find(n => n.id_notif === id);
                if (notif) notif.leida = true;
                renderizar();
            } catch(e) {
                alert('Error al marcar como leída');
            }
        }

        async function marcarTodasLeidas() {
            const noLeidas = todasNotifs.filter(n => !n.leida);
            await Promise.all(noLeidas.map(n => api.marcarNotificacionLeida(n.id_notif).catch(()=>{})));
            todasNotifs.forEach(n => n.leida = true);
            renderizar();
        }

        function escaparHTML(t) {
            const div = document.createElement('div');
            div.textContent = t;
            return div.innerHTML;
        }

        async function cargarMensajes() {
            if (api.rol !== 'padre') return;
            document.getElementById('secMensajes').classList.remove('hidden');
            try {
                const mensajes = await api.misMensajes();

                if (!mensajes.length) {
                    document.getElementById('listMensajes').innerHTML =
                        '<p class="text-sm text-slate-500 text-center py-4">Sin mensajes aún.</p>';
                    return;
                }

                document.getElementById('listMensajes').innerHTML = mensajes.map(m => {
                    const nuevo = !m.leido ? '<span class="ml-2 inline-flex items-center rounded-full bg-emerald-100 px-2 py-0.5 text-[10px] font-semibold text-emerald-700 uppercase">Nuevo</span>' : '';
                    return `
                    <article class="rounded-3xl border ${m.leido ? 'border-slate-200' : 'border-emerald-300 bg-emerald-50/40'} bg-white/90 p-4 shadow-sm">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex gap-2 items-start">
                                <span>👩‍🏫</span>
                                <div>
                                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">
                                        Maestro ${escaparHTML(m.nombre_maestro || '')} ${escaparHTML(m.apellido_maestro || '')}
                                        ${nuevo}
                                    </p>
                                    <p class="text-sm text-slate-800 mt-0.5 whitespace-pre-wrap">${escaparHTML(m.contenido)}</p>
                                </div>
                            </div>
                            <time class="text-xs text-slate-400 shrink-0">${fmtFecha(m.fecha_envio)}</time>
                        </div>
                    </article>`;
                }).join('');

                // Auto-marcar como leídos los que vinieron sin leer.
                if (mensajes.some(m => !m.leido)) {
                    api.marcarMensajesLeidos().catch(() => {/* silencioso */});
                }
            } catch(e) {
                document.getElementById('listMensajes').innerHTML =
                    '<p class="text-sm text-red-400 text-center py-4">Error al cargar mensajes.</p>';
            }
        }

        async function init() {
            const badge = document.getElementById('roleBadge');
            if (api.rol === 'maestro') {
                badge.textContent = 'Maestro';
                badge.className = 'mt-2 inline-flex items-center rounded-full bg-blue-100 px-3 py-1 text-sm font-medium text-blue-700';
            } else {
                badge.textContent = 'Padre de Familia';
                badge.className = 'mt-2 inline-flex items-center rounded-full bg-green-100 px-3 py-1 text-sm font-medium text-green-700';
            }

            // Padres ven notificaciones push; maestros solo ven sección de mensajes vacía
            if (api.rol === 'padre') {
                try {
                    todasNotifs = await api.misNotificaciones();
                    renderizar();
                } catch(e) {
                    document.getElementById('listNotifs').innerHTML =
                        `<p class="text-sm text-red-400 text-center py-4">Error: ${e.message}</p>`;
                }
                await cargarMensajes();
            } else {
                document.getElementById('listNotifs').innerHTML =
                    '<p class="text-sm text-slate-500 text-center py-6">Las notificaciones push son para padres de familia.<br>Usa el panel de mensajes para comunicarte con ellos.</p>';
                document.getElementById('countBadge').textContent = '—';
            }
        }

        function cerrarSesion() { api.logout(); window.location.href = 'index.html'; }

        init();
    </script>
</body>
</html>
